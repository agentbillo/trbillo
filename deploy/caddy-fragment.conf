# Trbillo Caddy snippet
#
# Add the two `handle` blocks below INSIDE your existing
# `slowbase.com { ... }` site block in /etc/caddy/Caddyfile.
#
# Example shape:
#
#   slowbase.com {
#       # ... your other handles ...
#
#       # --- Trbillo (begin) ---
#       handle /trbillo {
#           redir /trbillo/ 308
#       }
#       handle /trbillo/* {
#           reverse_proxy localhost:8080
#       }
#       # --- Trbillo (end) ---
#   }
#
# Notes:
# - `reverse_proxy` automatically upgrades WebSocket requests, so /trbillo/api/ws
#   and /trbillo/api/ws/user will work without extra config.
# - The /trbillo (no trailing slash) → /trbillo/ redirect is needed because the
#   Go server only matches the exact path /trbillo/.
# - After editing the Caddyfile:
#       sudo caddy validate --config /etc/caddy/Caddyfile
#       sudo systemctl reload caddy
